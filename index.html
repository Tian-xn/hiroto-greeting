<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寛人様へ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fef3f8 0%, #f0f7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
            position: relative;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .sakura {
            position: absolute;
            background: #ffb6c1;
            border-radius: 50% 0 50% 50%;
            opacity: 0.7;
            animation: fallWithSwing linear infinite;
            top: -10px;
        }

        @keyframes fallWithSwing {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
        }

        .enter-btn-container {
            z-index: 20;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .enter-btn {
            padding: 1.2rem 3rem;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, #ff6b9d, #ff9ff3);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
            animation: fadeIn 1s ease-out forwards, breathe 2s ease-in-out infinite;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 157, 0.4);
        }

        .enter-btn:active {
            transform: translateY(1px);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .greeting {
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            width: 90%;
            max-width: 800px;
        }

        .greeting.show {
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); pointer-events: auto; }
            from { opacity: 0; transform: translateY(30px); }
        }

        .greeting-text {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(90deg, #ff6b9d, #feca57, #48dbfb, #ff9ff3, #1dd1a1);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: gradientFlow 8s ease-in-out infinite, float 3s ease-in-out infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .sub-text {
            margin-top: 1.5rem;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #666;
            opacity: 0.8;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
            opacity: 0;
        }

        /* 🌟 新增：留言表单样式 */
        .message-form {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 1.5s ease-out 1s forwards;
            opacity: 0;
        }

        .message-input {
            padding: 1rem;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            font-size: 1rem;
            resize: none;
            height: 120px;
            outline: none;
            font-family: inherit;
        }

        .submit-btn {
            padding: 1rem;
            background: linear-gradient(90deg, #ff6b9d, #ff9ff3);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.03);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="enter-btn-container" id="enterContainer">
        <button class="enter-btn" id="enterBtn">🌟おかえり🌟</button>
    </div>

    <div class="greeting" id="greeting">
        <h1 class="greeting-text">寛人様、今日はどうお過ごしでしたか？</h1>
        <p class="sub-text">もしお時間があれば、どうかどうか=~=</p>

        <!-- 🌟 核心：留言表单（替换成你的邮箱） -->
        <form class="message-form" action="https://formspree.io/f/mreoygod" method="POST">
            <textarea class="message-input" name="message" placeholder="メッセージを入力してね" required></textarea>
            <button class="submit-btn" type="submit">送信 🎀</button>
        </form>
    </div>

    <script>
        // 生成樱花
        function createSakura() {
            for(let i=0;i<30;i++){
                const s = document.createElement('div');
                s.className = 'sakura';
                s.style.width = s.style.height = Math.random()*7+5+'px';
                s.style.left = Math.random()*100+'%';
                s.style.animationDuration = Math.random()*9+6+'s';
                document.body.appendChild(s);
            }
        }

        // 生成星光
        function createStars() {
            for(let i=0;i<50;i++){
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.animationDuration = Math.random()*3+2+'s';
                document.body.appendChild(s);
            }
        }

        // 点击进入
        document.getElementById('enterBtn').addEventListener('click',()=>{
            const enter = document.getElementById('enterContainer');
            enter.style.opacity = 0;
            enter.style.transition = '0.8s';
            setTimeout(()=>{
                enter.classList.add('hidden');
                document.getElementById('greeting').classList.add('show');
            },800);
        });

        window.onload = ()=>{ createSakura(); createStars(); }
    </script>
</body>
</html>
