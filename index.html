<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寛人様へ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全屏滚动容器：3页内容 */
        .container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            scroll-snap-type: y mandatory;
        }

        /* 通用全屏页面样式 */
        .page {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fef3f8 0%, #f0f7ff 100%);
            font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
            padding: 2rem;
        }

        body {
            overflow: hidden;
        }

        /* 星光装饰 */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: starTwinkle 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 樱花飘落 */
        .sakura {
            position: absolute;
            background: #ffb6c1;
            border-radius: 50% 0 50% 50%;
            opacity: 0.7;
            animation: fallWithSwing linear infinite;
            top: -10px;
            z-index: 1;
        }

        @keyframes fallWithSwing {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
        }

        /* 柔光斑纹（柔光效果） */
        .light-spot {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 250, 0.3);
            box-shadow: 0 0 20px 10px rgba(255, 182, 193, 0.2);
            opacity: 0.6;
            animation: lightFloat 20s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes lightFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            50% { transform: translate(50px, -30px) scale(1.2); opacity: 0.7; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
        }

        /* 全局渐变文字样式（统一风格） */
        .gradient-text {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            background: linear-gradient(90deg, #ff6b9d, #feca57, #48dbfb, #ff9ff3, #1dd1a1);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: gradientFlow 8s ease-in-out infinite, float 3s ease-in-out infinite;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* 全局按钮样式（统一风格） */
        .nav-btn {
            padding: 1rem 2.5rem;
            background: linear-gradient(90deg, #ff6b9d, #ff9ff3);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            cursor: pointer;
            transition: 0.3s;
            animation: fadeIn 1.5s ease-out forwards;
            margin-top: 1rem;
            z-index: 30;
            position: relative;
        }

        .nav-btn:hover {
            transform: scale(1.05);
        }

        /* 动画通用 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* -------------------- 第二页：温かいお話 -------------------- */
        .story-content {
            width: 90%;
            max-width: 700px;
            text-align: center;
            z-index: 10;
            /* 🔥 优化：顶部内边距，整体下移内容，彻底避免标题溢出 */
            padding-top: 1rem;
        }

        /* 🔥 优化：缩小标题字体，降低高度，解决跨页问题 */
        .story-title {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(90deg, #ff6b9d, #ff9ff3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.2rem;
        }

        /* 🔥 优化：进一步微缩故事字体，更紧凑，完全适配页面 */
        .story-text {
            font-size: clamp(0.85rem, 2.3vw, 1rem);
            color: #555;
            line-height: 1.8;
            text-align: left;
            white-space: pre-line;
            opacity: 0.95;
            border: 2px solid #ffb6c1;
            border-radius: 20px;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.7);
            margin-bottom: 80px;
        }

        /* 第二页继续按钮固定底部 */
        .page2 .nav-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-55%);
        }

        /* -------------------- 第三页：留言页面 -------------------- */
        .page3 {
            gap: 1rem;
        }

        .page3 .gradient-text {
            font-size: clamp(2.5rem, 8vw, 5rem);
        }

        .sub-text {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #666;
            opacity: 0.8;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* 留言表单 */
        .message-form {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 1.5s ease-out 1s forwards;
        }

        .message-input {
            padding: 1rem;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            font-size: 1rem;
            resize: none;
            height: 120px;
            outline: none;
            font-family: inherit;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- 🌟 第一页：おかえり 欢迎页 -->
        <section class="page page1">
            <h1 class="gradient-text">🌟おかえり🌟</h1>
            <button class="nav-btn" id="toPage2">📖 暖かいお話を読もう</button>
        </section>

        <!-- 🌟 第二页：温馨日语小故事（标题完全在本页） -->
        <section class="page page2">
            <div class="story-content">
                <h2 class="story-title">小さな桜とリス</h2>
                <p class="story-text">春の日、小さな桜の木が咲きました。
一匹の小さなリスが、桜の下で休んでいます。

「桜さん、あなたの花はとても優しい色ですね」
リスがそっと囁きました。

桜は風に揺れて、花びらを落としました。
それはまるで、リスに笑いかけているようでした。

毎日、リスは桜の下に来て、お話をします。
寂しい時も、嬉しい時も。

桜はいつも静かに、リスのそばにいてくれました。

どんな小さな出会いも、心を温めてくれる。
そんな、優しい春の物語です。</p>
            </div>
            <button class="nav-btn" id="toPage3">▶ 続ける</button>
        </section>

        <!-- 🌟 第三页：问候 + 留言表单 -->
        <section class="page page3">
            <h1 class="gradient-text">寛人様、今日はどうお過ごしでしたか？</h1>
            <p class="sub-text">メッセージが欲しい！お時間があれば、どうかどうか=~=</p>
            
            <form class="message-form" action="https://formspree.io/f/mreoygod" method="POST">
                <textarea class="message-input" name="message" placeholder="メッセージを入力してね" required></textarea>
                <button class="nav-btn" type="submit">送信 🎀</button>
            </form>
        </section>
    </div>

    <script>
        // 生成樱花
        function createSakura() {
            for(let i=0;i<30;i++){
                const s = document.createElement('div');
                s.className = 'sakura';
                s.style.width = s.style.height = Math.random()*7+5+'px';
                s.style.left = Math.random()*100+'%';
                s.style.animationDuration = Math.random()*9+6+'s';
                document.body.appendChild(s);
            }
        }

        // 生成星光
        function createStars() {
            for(let i=0;i<50;i++){
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.animationDuration = Math.random()*3+2+'s';
                document.body.appendChild(s);
            }
        }

        // 生成柔光斑纹
        function createLightSpots() {
            for(let i=0;i<8;i++){
                const l = document.createElement('div');
                l.className = 'light-spot';
                const size = Math.random()*150+100+'px';
                l.style.width = size;
                l.style.height = size;
                l.style.left = Math.random()*100+'%';
                l.style.top = Math.random()*100+'%';
                l.style.animationDuration = Math.random()*15+20+'s';
                document.body.appendChild(l);
            }
        }

        // 页面切换逻辑
        const container = document.getElementById('container');
        document.getElementById('toPage2').addEventListener('click', () => {
            container.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        });
        document.getElementById('toPage3').addEventListener('click', () => {
            container.scrollTo({ top: window.innerHeight * 2, behavior: 'smooth' });
        });

        // 初始化
        window.onload = ()=>{ 
            createSakura(); 
            createStars(); 
            createLightSpots();
        }
    </script>
</body>
</html>
